<!DOCTYPE html>
<html>
<head>

<title>Dark Mode Toggle</title>

<style>

/* Default Light Mode */
body{
font-family: Arial, sans-serif;
background: white;
color: black;
text-align: center;
padding-top: 50px;
transition: 0.3s;
}

/* Dark Mode Style */
.dark{
background: black;
color: white;
}

/* Button Styling */
button{
padding: 10px 20px;
font-size: 16px;
cursor: pointer;
border: none;
background: #007bff;
color: white;
border-radius: 5px;
}

button:hover{
background: #0056b3;
}

</style>

</head>

<body>

<h2>Dark Mode Toggle Example</h2>

<button id="darkMode">Toggle Dark Mode</button>

<script>

/* Arrow Function for Dark Mode Toggle */

document.getElementById("darkMode").addEventListener("click", () => {

document.body.classList.toggle("dark");

});

</script>

</body>

</html>
